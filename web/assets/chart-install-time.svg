  <rect x="340.0" y="243.8" width="38" height="26.2" fill="rgba(0,85,58,0.45)"/>
  <text x="359.0" y="257.8" text-anchor="middle" class="bar-value">12s</text>
  <rect x="384.0" y="155.8" width="38" height="114.2" fill="rgba(0,85,58,0.22)"/>
