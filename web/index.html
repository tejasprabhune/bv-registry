<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bv registry</title>
  <link rel="stylesheet" href="https://use.typekit.net/bsk0vur.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 class="site-title">bv registry</h1>
  <p class="site-subtitle">reproducible bioinformatics tools</p>
</header>

<div class="controls-bar">
  <input type="search" id="search" placeholder="find a tool..." autocomplete="off" spellcheck="false">
  <select id="tier-filter">
    <option value="all">all tiers</option>
    <option value="core">core</option>
    <option value="community">community</option>
    <option value="experimental">experimental</option>
  </select>
  <select id="type-filter">
    <option value="">all types</option>
  </select>
  <span class="results-count" id="results-count"></span>
</div>

<div class="grid-wrap">
  <div class="tool-grid" id="tool-grid">
    <div class="empty">loading...</div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-name" id="modal-title"></div>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <button class="modal-close" id="modal-close">&#x2715;</button>
    </div>

    <div class="modal-section">
      <div class="section-label">description</div>
      <div class="modal-desc" id="modal-desc"></div>
    </div>

    <div class="modal-section" id="modal-homepage-section">
      <div class="section-label">homepage</div>
      <div id="modal-homepage"></div>
    </div>

    <div class="modal-section">
      <div class="section-label">inputs</div>
      <div class="io-list" id="modal-inputs"></div>
    </div>

    <div class="modal-section">
      <div class="section-label">outputs</div>
      <div class="io-list" id="modal-outputs"></div>
    </div>

    <div class="modal-section">
      <div class="section-label">maintainers</div>
      <div class="io-list" id="modal-maintainers"></div>
    </div>

    <div class="modal-section last">
      <div class="section-label">versions</div>
      <div class="versions-row" id="modal-versions"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
