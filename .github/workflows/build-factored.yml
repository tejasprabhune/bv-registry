name: Build Factored OCI Images

on:
  push:
    paths:
      - 'specs/**/*.yaml'
  workflow_dispatch:
    inputs:
      spec:
        description: 'Spec path to rebuild (e.g. specs/samtools/1.19.2.yaml), or leave blank to rebuild all'
        required: false

jobs:
  detect:
    name: Detect specs to build
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.list.outputs.specs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: List specs
        id: list
        run: |
          if [ -n "${{ github.event.inputs.spec }}" ]; then
            SPECS='["${{ github.event.inputs.spec }}"]'
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SPECS=$(find specs -name '*.yaml' | jq -R . | jq -cs .)
          else
            SPECS=$(git diff --name-only HEAD~1 HEAD -- 'specs/**/*.yaml' \
              | jq -R . | jq -cs .)
          fi
          echo "specs=$SPECS" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.spec }}
    needs: detect
    if: ${{ needs.detect.outputs.specs != '[]' && needs.detect.outputs.specs != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spec: ${{ fromJson(needs.detect.outputs.specs) }}
      fail-fast: false

    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Check out bv (for bv-builder)
        uses: actions/checkout@v4
        with:
          repository: tejasprabhune/bv
          path: _bv

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: _bv -> _bv/target

      - name: Build bv-builder
        run: cargo build --release -p bv-builder
        working-directory: _bv

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image reference
        id: ref
        run: |
          SPEC="${{ matrix.spec }}"
          NAME=$(basename "$(dirname "$SPEC")")
          VERSION=$(basename "$SPEC" .yaml)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=ghcr.io/${{ github.repository_owner }}/bv-pkg/${NAME}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "manifest=tools/${NAME}/${VERSION}.toml" >> "$GITHUB_OUTPUT"

      - name: Resolve spec
        id: resolve
        run: |
          _bv/target/release/bv-builder resolve "${{ matrix.spec }}" \
            --out /tmp/resolved.json
          echo "packages=$(jq '.packages | length' /tmp/resolved.json)" >> "$GITHUB_OUTPUT"

      - name: Build factored image
        run: |
          _bv/target/release/bv-builder build "${{ matrix.spec }}" \
            --output /tmp/image.tar
          echo "Built ${{ steps.resolve.outputs.packages }} packages into layers"

      - name: Push image
        id: push
        run: |
          _bv/target/release/bv-builder push /tmp/image.tar "${{ steps.ref.outputs.ref }}"
          DIGEST=$(cat /tmp/push-digest.txt 2>/dev/null)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Verify pushed image
        if: steps.push.outputs.digest != ''
        run: |
          _bv/target/release/bv-builder verify \
            "${{ steps.ref.outputs.ref }}@${{ steps.push.outputs.digest }}" \
            --digest "${{ steps.push.outputs.digest }}"

      - name: Update manifest with factored digest
        if: steps.push.outputs.digest != ''
        run: |
          pip -q install toml
          python3 - <<'PYEOF'
          import os, toml

          path = os.environ['MANIFEST']
          ref  = os.environ['REF']
          digest = os.environ['DIGEST']
          spec = os.environ['SPEC']

          with open(path) as f:
              data = toml.load(f)

          data['tool'].setdefault('factored', {})
          data['tool']['factored']['spec_path'] = spec
          data['tool']['factored']['image_reference'] = ref
          data['tool']['factored']['image_digest'] = digest

          with open(path, 'w') as f:
              toml.dump(data, f)

          print(f"Updated {path}: {ref}@{digest}")
          PYEOF
        env:
          MANIFEST: ${{ steps.ref.outputs.manifest }}
          REF: ${{ steps.ref.outputs.ref }}
          DIGEST: ${{ steps.push.outputs.digest }}
          SPEC: ${{ matrix.spec }}

      - name: Commit updated manifest
        if: steps.push.outputs.digest != ''
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "factored: ${{ steps.ref.outputs.name }} ${{ steps.ref.outputs.version }}"
          file_pattern: "tools/${{ steps.ref.outputs.name }}/${{ steps.ref.outputs.version }}.toml"

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.push.outputs.digest != ''
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `**Factored build: \`${{ matrix.spec }}\`**`,
                `- Reference: \`${{ steps.ref.outputs.ref }}\``,
                `- Digest: \`${{ steps.push.outputs.digest }}\``,
                `- Packages: ${{ steps.resolve.outputs.packages }}`,
              ].join('\n')
            })
