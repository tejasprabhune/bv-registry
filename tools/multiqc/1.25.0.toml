[tool]
id = "multiqc"
version = "1.25.0"
description = "Aggregate results from bioinformatics analyses across many samples into a single report"
homepage = "https://multiqc.info/"
license = "GPL-3.0"
tier = "core"
maintainers = [ "github:ewels",]
[[tool.inputs]]
name = "analysis_dir"
type = "dir"
cardinality = "one"
description = "Directory containing output files from supported tools"

[[tool.outputs]]
name = "report_dir"
type = "dir"
cardinality = "one"
description = "MultiQC HTML report and data directory"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/multiqc:1.25--pyhdfd78af_0"

[tool.hardware]
cpu_cores = 2
ram_gb = 4.0
disk_gb = 1.0

[tool.entrypoint]
command = "multiqc"
args_template = "{analysis_dir} --outdir {report_dir}"

[tool.binaries]
exposed = [ "multiqc",]

[tool.factored]
spec_path = "specs/multiqc/1.25.0.yaml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/multiqc:1.25.0"
image_digest = "sha256:09e73ef524e9e59335f74c84470f25f1154db49cc8a95bcc2ca987cd4b661a8b"
