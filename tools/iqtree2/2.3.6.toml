[tool]
id = "iqtree2"
version = "2.3.6"
description = "IQ-TREE 2: maximum-likelihood phylogenetic inference with ultrafast bootstrap"
homepage = "http://www.iqtree.org/"
license = "GPL-2.0"
tier = "core"
maintainers = [ "github:iqtree",]
[[tool.inputs]]
name = "alignment"
type = "msa"
cardinality = "one"
description = "Multiple sequence alignment"

[[tool.outputs]]
name = "output_prefix"
type = "file"
cardinality = "one"
description = "Output prefix for tree files (.treefile, .log, etc.)"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/iqtree:2.3.6--h503566f_1"

[tool.hardware]
cpu_cores = 8
ram_gb = 8.0
disk_gb = 2.0

[tool.entrypoint]
command = "iqtree2"
args_template = "-s {alignment} -nt {cpu_cores} -bb 1000 -pre {output_prefix}"

[tool.binaries]
exposed = [ "iqtree2",]

[tool.factored]
spec_path = "specs/iqtree2/2.3.6.yaml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/iqtree2:2.3.6"
image_digest = "sha256:4ee6e5b9550ad5c723cbe76d96e7cac89a1d435da573257d5cd0bb645c0eab6b"
