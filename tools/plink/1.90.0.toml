[tool]
id = "plink"
version = "1.90.0"
description = "Whole-genome association analysis toolset for large-scale genomic data"
homepage = "https://www.cog-genomics.org/plink/"
license = "GPL-3.0"
tier = "community"
maintainers = [ "github:chrchang",]
[[tool.inputs]]
name = "vcf"
type = "vcf"
cardinality = "one"
description = "Input VCF or PLINK binary files"

[[tool.outputs]]
name = "output_prefix"
type = "file"
cardinality = "one"
description = "PLINK binary format output prefix"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/plink:1.90b6.21--hec16e2b_4"

[tool.hardware]
cpu_cores = 4
ram_gb = 8.0
disk_gb = 5.0

[tool.entrypoint]
command = "plink"
args_template = "--vcf {vcf} --out {output_prefix} --make-bed --threads {cpu_cores}"

[tool.binaries]
exposed = [ "plink",]

[tool.factored]
spec_path = "specs/plink/1.90.0.yaml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/plink:1.90.0"
image_digest = "sha256:b0e11b0bb865899c857c0a8cc3dfd26f1a8c3a0a2563fccbc7c7db13adc7436b"
