[tool]
id = "vcftools"
version = "0.1.16"
description = "Tools for working with VCF files: filtering, statistics, and format conversion"
homepage = "https://vcftools.github.io/"
license = "GPL-3.0"
tier = "community"
maintainers = [ "github:vcftools",]
[[tool.inputs]]
name = "input"
type = "vcf"
cardinality = "one"
description = "Input VCF file"

[[tool.outputs]]
name = "output_prefix"
type = "file"
cardinality = "one"
description = "Output prefix for filtered files"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/vcftools:0.1.16--pl5321h077b44d_12"

[tool.hardware]
cpu_cores = 2
ram_gb = 4.0
disk_gb = 2.0

[tool.entrypoint]
command = "vcftools"
args_template = "--vcf {input} --out {output_prefix} --recode"

[tool.binaries]
exposed = [ "vcftools",]

[tool.factored]
spec_path = "specs/vcftools/0.1.16.yaml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/vcftools:0.1.16"
image_digest = "sha256:56f8b3e694dc08cd00afa49c38533545bd1d42562a238dab1482789d4e589dad"
