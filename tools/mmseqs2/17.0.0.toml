[tool]
id = "mmseqs2"
version = "17.0.0"
description = "MMseqs2: ultra-fast protein and nucleotide sequence search"
homepage = "https://github.com/soedinglab/MMseqs2"
license = "GPL-3.0"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/mmseqs2:17.b804f--hd6d6fdc_1"

[tool.hardware]
cpu_cores = 8
ram_gb = 16.0
disk_gb = 5.0

[[tool.inputs]]
name = "query"
type = "fasta"
cardinality = "one"
description = "Query sequences"

[[tool.inputs]]
name = "db"
type = "mmseqs_db"
cardinality = "one"
description = "Target MMseqs2 database directory"

[[tool.outputs]]
name = "output"
type = "mmseqs_output"
cardinality = "one"
description = "MMseqs2 search results"

[tool.entrypoint]
command = "mmseqs"
args_template = "easy-search {query} {db} {output} tmp --threads {cpu_cores}"
