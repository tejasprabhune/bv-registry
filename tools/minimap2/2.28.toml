[tool]
id = "minimap2"
version = "2.28"
description = "Fast sequence alignment for long reads (PacBio, Oxford Nanopore) and spliced mRNA"
homepage = "https://github.com/lh3/minimap2"
license = "MIT"
tier = "core"
maintainers = ["github:lh3"]

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/minimap2:2.28--he4a0461_3"

[tool.hardware]
cpu_cores = 8
ram_gb = 16.0
disk_gb = 5.0

[[tool.inputs]]
name = "reads"
type = "fastq"
cardinality = "one"
description = "Query reads (FASTQ or FASTA)"

[[tool.inputs]]
name = "reference"
type = "fasta"
cardinality = "one"
description = "Reference sequence or assembly"

[[tool.outputs]]
name = "alignment"
type = "sam"
cardinality = "one"
description = "Alignment in SAM format"

[tool.entrypoint]
command = "minimap2"
args_template = "-ax map-ont -t {cpu_cores} {reference} {reads} > {alignment}"

[tool.binaries]
exposed = ["minimap2"]
