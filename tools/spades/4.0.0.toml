[tool]
id = "spades"
version = "4.0.0"
description = "SPAdes: de Bruijn graph assembler for Illumina, PacBio, and hybrid assemblies"
homepage = "https://github.com/ablab/spades"
license = "GPL-2.0"
tier = "core"
maintainers = [ "github:ablab",]
[[tool.inputs]]
name = "reads_r1"
type = "fastq"
cardinality = "one"
description = "Forward reads"

[[tool.inputs]]
name = "reads_r2"
type = "fastq"
cardinality = "optional"
description = "Reverse reads (paired-end)"

[[tool.outputs]]
name = "output_dir"
type = "dir"
cardinality = "one"
description = "Assembly output directory with contigs.fasta and scaffolds.fasta"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/spades:4.0.0--haf24da9_4"

[tool.hardware]
cpu_cores = 16
ram_gb = 32.0
disk_gb = 50.0

[tool.entrypoint]
command = "spades.py"
args_template = "--threads {cpu_cores} --memory {ram_gb} -1 {reads_r1} -2 {reads_r2} -o {output_dir}"

[tool.binaries]
exposed = [ "spades.py", "metaspades.py", "plasmidspades.py", "rnaspades.py", "rnaviralspades.py",]

[tool.factored]
spec_path = "specs/spades/4.0.0.yaml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/spades:4.0.0"
image_digest = "sha256:8799dca8d8296adb1da5545f18623aec66fbeadc2fbeae07d4e9c50dd382e613"
