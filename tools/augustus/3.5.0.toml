[tool]
id = "augustus"
version = "3.5.0"
description = "Ab initio eukaryotic gene prediction using a generalized hidden Markov model"
homepage = "https://github.com/Gaius-Augustus/Augustus"
license = "Artistic-2.0"
tier = "community"
maintainers = [ "github:Gaius-Augustus",]
[[tool.inputs]]
name = "genome"
type = "fasta"
cardinality = "one"
description = "Eukaryotic genome sequence"

[[tool.outputs]]
name = "predictions"
type = "file"
cardinality = "one"
description = "Gene predictions in GFF3 format"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/augustus:3.5.0--pl5321h700735d_3"

[tool.hardware]
cpu_cores = 4
ram_gb = 8.0
disk_gb = 5.0

[tool.entrypoint]
command = "augustus"
args_template = "--species=human --gff3=on {genome} > {predictions}"

[tool.binaries]
exposed = [ "augustus", "etraining", "fastBlockSearch", "filterBam", "prepareAlign",]

[tool.factored]
spec_path = "specs/augustus/3.5.0.yaml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/augustus:3.5.0"
image_digest = "sha256:cf2c7064fe92369a801f270e197b00bb43a0d25cf87b45aad3c4ff7aae2f00c7"
