[tool]
id = "freebayes"
version = "1.3.7"
description = "Bayesian haplotype-based genetic variant detector"
homepage = "https://github.com/freebayes/freebayes"
license = "MIT"
tier = "community"
maintainers = [ "github:freebayes",]
[[tool.inputs]]
name = "bam"
type = "bam"
cardinality = "one"
description = "Aligned reads in sorted BAM format"

[[tool.inputs]]
name = "reference"
type = "fasta"
cardinality = "one"
description = "Reference genome FASTA"

[[tool.outputs]]
name = "vcf"
type = "vcf"
cardinality = "one"
description = "Called variants in VCF format"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/freebayes:1.3.7--h6a68c12_2"

[tool.hardware]
cpu_cores = 4
ram_gb = 8.0
disk_gb = 2.0

[tool.entrypoint]
command = "freebayes"
args_template = "-f {reference} {bam} > {vcf}"

[tool.binaries]
exposed = [ "freebayes", "bamleftalign", "freebayes-parallel",]

[tool.factored]
spec_path = "specs/freebayes/1.3.7.toml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/freebayes:1.3.7"
image_digest = "sha256:e879c3c5214247c1e537f8f6784a61e4fefb648d64bfff4abd1178718c50ebce"
