[tool]
id = "samtools"
version = "1.21.0"
description = "Tools for manipulating next-generation sequencing data in SAM/BAM/CRAM formats"
homepage = "http://www.htslib.org/"
license = "MIT"
tier = "core"
maintainers = [ "github:samtools",]
[[tool.inputs]]
name = "input"
type = "bam"
cardinality = "one"
description = "Input alignment file (BAM, SAM, or CRAM)"

[[tool.outputs]]
name = "output"
type = "bam"
cardinality = "one"
description = "Processed alignment file"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/samtools:1.21--h50ea8bc_0"

[tool.hardware]
cpu_cores = 4
ram_gb = 8.0
disk_gb = 2.0

[tool.entrypoint]
command = "samtools"
args_template = "sort -@ {cpu_cores} -o {output} {input}"

[tool.binaries]
exposed = [ "samtools",]

[tool.factored]
spec_path = "specs/samtools/1.21.0.yaml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/samtools:1.21.0"
image_digest = "sha256:95ca28c1a4e6255addd4dfca17f7e552dec019d87b6e40593344624f19e9c63e"
