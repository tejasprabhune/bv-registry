[tool]
id = "busco"
version = "6.0.0"
description = "Assessment of assembly completeness using Universal Single Copy Orthologs."
homepage = "https://busco.ezlab.org"
license = "MIT"
[[tool.inputs]]
name = "sequences"
type = "fasta"
cardinality = "one"
description = "Assembly, transcriptome, or proteome to assess"

[[tool.outputs]]
name = "results"
type = "dir"
cardinality = "one"
description = "BUSCO output dir (short_summary.txt, full_table.tsv, missing_busco_list.tsv, run_*/)"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/busco:6.0.0--pyhdfd78af_3"
digest = "sha256:9450959bc503533acf604c514712b9fd5944f9a277ef13c6026e9f4e188147cf"

[tool.hardware]
cpu_cores = 1
ram_gb = 2.0
disk_gb = 1.0

[tool.entrypoint]
command = "busco"

[tool.binaries]
exposed = [ "busco",]

[tool.factored]
spec_path = "specs/busco/6.0.0.toml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/busco:6.0.0"
image_digest = "sha256:7903131c7bddfd11af65c50257ad2b86182da72e5da8f129f812a169257d651d"
