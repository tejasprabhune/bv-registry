[tool]
id = "tmalign"
version = "2024.3.3"
description = "TM-align sequence-order independent protein structure alignment."
homepage = "https://github.com/pylelab/USalign"
license = "BSD-like"
[[tool.inputs]]
name = "structure_a"
type = "pdb"
cardinality = "one"
description = "First structure to align"

[[tool.inputs]]
name = "structure_b"
type = "pdb"
cardinality = "one"
description = "Reference structure"

[[tool.outputs]]
name = "alignment"
type = "file"
cardinality = "one"
description = "TM-score + aligned residue mapping (text)"

[[tool.outputs]]
name = "superposition"
type = "pdb"
cardinality = "optional"
description = "Rotated structure_a aligned to structure_b (-o flag)"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/tmalign:20240303--hd63eeec_0"
digest = "sha256:c234ca5adebd43bb94fbc01d5bf9653bca3e017913aa767ae858bffc245ba86e"

[tool.metadata]
upstream_version = "20240303"

[tool.hardware]
cpu_cores = 1
ram_gb = 2.0
disk_gb = 1.0

[tool.entrypoint]
command = "TMalign"

[tool.subcommands]
tmscore = [ "TMscore",]

[tool.binaries]
exposed = [ "TMalign", "TMscore",]

[tool.factored]
spec_path = "specs/tmalign/2024.3.3.yaml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/tmalign:2024.3.3"
image_digest = "sha256:fdc119f5c0e1b9bf99fd2ad06eceaa94c89d5f2951dab8055ac88f75b0e5fcd7"
