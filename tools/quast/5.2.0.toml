[tool]
id = "quast"
version = "5.2.0"
description = "Quality assessment tool for genome assemblies"
homepage = "https://github.com/ablab/quast"
license = "GPL-2.0"
tier = "community"
maintainers = [ "github:ablab",]
[[tool.inputs]]
name = "assembly"
type = "fasta"
cardinality = "many"
description = "Assembly FASTA file(s) to assess"

[[tool.outputs]]
name = "report_dir"
type = "dir"
cardinality = "one"
description = "QUAST reports (HTML, text, PDF)"

[tool.image]
backend = "docker"
reference = "quay.io/biocontainers/quast:5.2.0--py39pl5321h2add14b_1"

[tool.hardware]
cpu_cores = 4
ram_gb = 4.0
disk_gb = 2.0

[tool.entrypoint]
command = "quast"
args_template = "--threads {cpu_cores} -o {report_dir} {assembly}"

[tool.binaries]
exposed = [ "quast", "metaquast.py", "icarus.py",]

[tool.factored]
spec_path = "specs/quast/5.2.0.toml"
image_reference = "ghcr.io/tejasprabhune/bv-pkg/quast:5.2.0"
image_digest = "sha256:145eccf699154aee2da6650f0823fbea414c36d483bf288729d948651b1485d4"
